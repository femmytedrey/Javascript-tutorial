<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Posts Manager</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        padding: 2rem;
        color: #1a1a1a;
      }

      h1 {
        color: #1b3a5c;
        margin-bottom: 1.5rem;
      }
      h2 {
        color: #1b3a5c;
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }

      /* ── Two-column layout ── */
      .layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 1.5rem;
        max-width: 1100px;
        margin: 0 auto;
      }

      /* ── Form panel ── */
      .form-panel {
        background: white;
        border-radius: 10px;
        padding: 1.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        align-self: start; /* don't stretch to full height */
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: bold;
        color: #333;
        margin-bottom: 0.35rem;
      }

      input[type="text"],
      textarea {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 0.95rem;
        font-family: Arial, sans-serif;
      }

      input[type="text"]:focus,
      textarea:focus {
        outline: none;
        border-color: #2e75b6;
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      /* ── Buttons ── */
      .btn-row {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }

      .btn {
        padding: 0.6rem 1.2rem;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        font-weight: bold;
      }

      .btn-create {
        background: #2e75b6;
        color: white;
        flex: 1;
      }
      .btn-update {
        background: #f5a623;
        color: white;
        flex: 1;
        display: none;
      }
      .btn-cancel {
        background: #eee;
        color: #333;
      }

      .btn:hover {
        opacity: 0.88;
      }

      /* ── Status message ── */
      #status {
        margin-top: 0.75rem;
        font-size: 0.875rem;
        min-height: 1.2em;
        color: #2e75b6;
      }

      /* ── Posts list panel ── */
      .posts-panel {
        background: white;
        border-radius: 10px;
        padding: 1.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      #posts-list {
        display: grid;
        gap: 0.75rem;
      }

      /* ── Individual post card ── */
      .post-card {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 1rem 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
      }

      .post-card .post-text {
        flex: 1;
      }

      .post-card .post-id {
        font-size: 0.75rem;
        color: #999;
        margin-bottom: 0.25rem;
      }

      .post-card h3 {
        font-size: 0.95rem;
        color: #1b3a5c;
        margin-bottom: 0.35rem;
        text-transform: capitalize;
      }

      .post-card p {
        font-size: 0.85rem;
        color: #666;
        line-height: 1.5;
      }

      .post-actions {
        display: flex;
        gap: 0.4rem;
        flex-shrink: 0;
      }

      .btn-edit {
        background: #e8f0f8;
        color: #2e75b6;
        padding: 0.4rem 0.8rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .btn-delete {
        background: #fdecea;
        color: #c62828;
        padding: 0.4rem 0.8rem;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.8rem;
      }

      .btn-edit:hover {
        background: #d0e4f7;
      }
      .btn-delete:hover {
        background: #f8d7d5;
      }

      /* ── Loading placeholder ── */
      #loading {
        color: #888;
        text-align: center;
        padding: 2rem;
      }
    </style>
  </head>
  <body>
    <h1>Posts Manager</h1>

    <div class="layout">
      <!-- LEFT: form for creating and editing posts -->
      <div class="form-panel">
        <h2 id="form-title">Create New Post</h2>

        <div class="form-group">
          <label for="post-title">Title</label>
          <input
            type="text"
            id="post-title"
            placeholder="Enter post title..."
          />
        </div>

        <div class="form-group">
          <label for="post-body">Body</label>
          <textarea
            id="post-body"
            placeholder="Write the post content..."
          ></textarea>
        </div>

        <!-- Hidden input to track which post is being edited -->
        <input type="hidden" id="editing-id" value="" />

        <div class="btn-row">
          <button class="btn btn-create" id="create-btn">Create Post</button>
          <button class="btn btn-update" id="update-btn">Save Changes</button>
          <button class="btn btn-cancel" id="cancel-btn">Cancel</button>
        </div>

        <!-- Status message: shows "Creating...", "Saved!", errors etc. -->
        <div id="status"></div>
      </div>

      <!-- RIGHT: list of posts fetched from the API -->
      <div class="posts-panel">
        <h2>All Posts</h2>
        <div id="loading">Loading posts...</div>
        <div id="posts-list"></div>
      </div>
    </div>

    <script src="crud.js"></script>
  </body>
</html>
