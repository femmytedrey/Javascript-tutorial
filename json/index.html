<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub User Search</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #0d1117; /* GitHub's dark background */
        color: #c9d1d9;
        min-height: 100vh;
        padding: 2rem;
      }

      /* ── Search section ── */
      .search-section {
        max-width: 600px;
        margin: 0 auto 2rem;
      }

      h1 {
        text-align: center;
        color: #e6edf3;
        font-size: 1.8rem;
        margin-bottom: 1.5rem;
      }

      .search-bar {
        display: flex;
        gap: 0.5rem;
      }

      .search-bar input {
        flex: 1;
        padding: 0.75rem 1rem;
        border: 1px solid #30363d;
        border-radius: 6px;
        background: #161b22;
        color: #e6edf3;
        font-size: 1rem;
      }

      .search-bar input:focus {
        outline: none;
        border-color: #388bfd;
      }

      .search-bar button {
        padding: 0.75rem 1.5rem;
        background: #238636;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: bold;
      }

      .search-bar button:hover {
        background: #2ea043;
      }

      /* ── Status messages ── */
      #status {
        text-align: center;
        padding: 1rem;
        color: #8b949e;
      }

      /* ── Profile card ── */
      #profile {
        display: none; /* hidden until data loads */
        max-width: 700px;
        margin: 0 auto 2rem;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 10px;
        padding: 1.5rem;
      }

      .profile-header {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .profile-header img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 3px solid #30363d;
      }

      .profile-info h2 {
        font-size: 1.3rem;
        color: #e6edf3;
        margin-bottom: 0.25rem;
      }

      .profile-info .username {
        color: #8b949e;
        font-size: 0.95rem;
        margin-bottom: 0.5rem;
      }

      .profile-info .bio {
        color: #c9d1d9;
        font-size: 0.9rem;
      }

      .profile-stats {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }

      .stat {
        text-align: center;
      }

      .stat .number {
        font-size: 1.2rem;
        font-weight: bold;
        color: #e6edf3;
      }

      .stat .label {
        font-size: 0.8rem;
        color: #8b949e;
      }

      /* ── Repos section ── */
      #repos-section {
        display: none; /* hidden until data loads */
        max-width: 700px;
        margin: 0 auto;
      }

      #repos-section h3 {
        color: #e6edf3;
        margin-bottom: 1rem;
      }

      #repos-list {
        display: grid;
        gap: 0.75rem;
      }

      .repo-card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 1rem 1.25rem;
      }

      .repo-card .repo-name {
        color: #388bfd;
        font-weight: bold;
        font-size: 1rem;
        text-decoration: none;
        display: block;
        margin-bottom: 0.4rem;
      }

      .repo-card .repo-name:hover {
        text-decoration: underline;
      }

      .repo-card .repo-description {
        color: #8b949e;
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
      }

      .repo-meta {
        display: flex;
        gap: 1rem;
        font-size: 0.8rem;
        color: #8b949e;
      }
    </style>
  </head>
  <body>
    <div class="search-section">
      <h1>GitHub User Search</h1>
      <div class="search-bar">
        <input
          type="text"
          id="username-input"
          placeholder="Enter GitHub username..."
          autocomplete="off"
        />
        <button id="search-btn">Search</button>
      </div>
    </div>

    <!-- Status: loading / error messages appear here -->
    <div id="status"></div>

    <!-- Profile card: hidden until a user is found -->
    <div id="profile">
      <div class="profile-header">
        <img id="avatar" src="" alt="Avatar" />
        <div class="profile-info">
          <h2 id="full-name"></h2>
          <div class="username" id="username-display"></div>
          <div class="bio" id="bio-display"></div>
        </div>
      </div>
      <div class="profile-stats">
        <div class="stat">
          <div class="number" id="repos-count"></div>
          <div class="label">Repositories</div>
        </div>
        <div class="stat">
          <div class="number" id="followers-count"></div>
          <div class="label">Followers</div>
        </div>
        <div class="stat">
          <div class="number" id="following-count"></div>
          <div class="label">Following</div>
        </div>
      </div>
    </div>

    <!-- Repos section: hidden until repos are fetched -->
    <div id="repos-section">
      <h3>Top Repositories</h3>
      <div id="repos-list"></div>
    </div>

    <script src="github.js"></script>
  </body>
</html>
